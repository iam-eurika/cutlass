[workspace]
members = [
    "crates/cutlass-app",
    "crates/cutlass-decode",
    "crates/cutlass-compositor",
    "crates/cutlass-engines",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
ffmpeg-next = "8.1.0"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
