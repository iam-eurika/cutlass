[workspace]
resolver = "3"
members = [
    "crates/cutlass-media",
    "crates/cutlass-app",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
authors = ["1mr-newton <eaidoo015@gmail.com>"]
repository = "https://github.com/1mr-newton/cutlass"

[workspace.dependencies]
cutlass-media = { path = "crates/cutlass-media" }

tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[profile.release]
lto = "thin"
codegen-units = 1
