[package]
name = "cutlass-ui-rewrite"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[dependencies]

slint = { version = "1.16", features = ["unstable-winit-030","unstable-wgpu-28", "renderer-femtovg-wgpu", "serde"] }
serde = { version = "1", features = ["derive"] }


[dev-dependencies]
# Used to verify the agent-facing wire format of `Command` (see
# `src/command.rs` tests). When the agent dispatcher lands, this moves
# up to a regular dependency.
serde_json = "1"

[build-dependencies]
slint-build = "1.16"
