[workspace]
members = [
    "crates/app",
    "crates/core",
    "crates/decoder",
    "crates/engine",
    "crates/models",
    "crates/renderer",
    "crates/timeline",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
wgpu = "29.0.3"
pollster = "0.4"
thiserror = "2"
uuid = { version = "1", features = ["v4"] }
crossbeam-channel = "0.5"
